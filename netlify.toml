[build]
  command = "pnpm install && pnpm --filter @workspace/frontend run build"
  publish = "artifacts/frontend/dist/public"

[build.environment]
  NODE_VERSION  = "20"
  PNPM_VERSION  = "10"
  PORT          = "5173"
  BASE_PATH     = "/"
  NETLIFY       = "true"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
